<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>RAG Chatbot</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #eceff1;
        }

        .container {
            width: 900px;
            margin: 30px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, .2);
            overflow: hidden;
        }

        .header {
            background: #0078D7;
            color: white;
            padding: 20px;
            font-size: 28px;
            text-align: center;
        }

        .upload-section {

            padding: 20px;
            border-bottom: 1px solid #ddd;
        }

        .upload-section h3 {
            margin-bottom: 15px;
        }

        input[type=file] {

            margin-bottom: 10px;
        }

        button {

            background: #0078D7;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {

            background: #005fa3;
        }

        #uploadStatus {

            margin-top: 15px;
            font-weight: bold;
        }

        .chat-box {

            height: 450px;
            overflow-y: auto;
            padding: 20px;
            background: #fafafa;
        }

        .message {

            margin-bottom: 15px;
        }

        .user {

            text-align: right;
        }

        .user span {

            display: inline-block;
            background: #0078D7;
            color: white;
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
        }

        .bot {

            text-align: left;
        }

        .bot span {

            display: inline-block;
            background: #e4e4e4;
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
        }

        .input-section {

            display: flex;
            border-top: 1px solid #ddd;
        }

        #question {

            flex: 1;
            padding: 15px;
            border: none;
            outline: none;
            font-size: 16px;
        }

        #sendBtn {

            width: 120px;
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="header">

            RAG Chatbot

        </div>

        <div class="upload-section">

            <h3>Upload PDF</h3>

            <input type="file" id="pdfFile" accept=".pdf">

            <br>

            <button onclick="uploadFile()">

                Upload

            </button>

            <div id="uploadStatus"></div>

        </div>


        <div class="chat-box" id="chatBox">

        </div>


        <div class="input-section">

            <input type="text" id="question" placeholder="Ask anything from uploaded document...">

            <button id="sendBtn" onclick="askQuestion()">

                Send

            </button>

        </div>

    </div>

    <script>

        async function uploadFile() {

            const file = document.getElementById("pdfFile").files[0];

            if (!file) {

                alert("Select PDF");

                return;
            }

            let formData = new FormData();

            formData.append("file", file);

            document.getElementById("uploadStatus").innerHTML = "Uploading...";

            let response = await fetch("/upload/", {

                method: "POST",

                body: formData

            });

            let result = await response.json();

            document.getElementById("uploadStatus").innerHTML =
                "✅ " + result.filename + " uploaded successfully.";
        }



        async function askQuestion() {

            let question = document.getElementById("question").value.trim();

            if (question === "")
                return;

            let chat = document.getElementById("chatBox");

            chat.innerHTML += `
        <div class="message user">
            <span>${question}</span>
        </div>
    `;

            document.getElementById("question").value = "";

            chat.scrollTop = chat.scrollHeight;

            let response = await fetch("/chat/", {

                method: "POST",

                headers: {

                    "Content-Type": "application/json"

                },

                body: JSON.stringify({

                    question: question

                })

            });

            let result = await response.json();

            chat.innerHTML += `
        <div class="message bot">
            <span>${result.answer}</span>
        </div>
    `;

            chat.scrollTop = chat.scrollHeight;

        }

        document.getElementById("question").addEventListener("keypress", function (e) {

            if (e.key === "Enter") {

                askQuestion();

            }

        });

    </script>

</body>

</html>
