<!DOCTYPE html>
<html>

<head>

<title>AI Chatbot</title>


<style>

body {
    font-family: Arial;
    background:#f5f5f5;
}


.chat-container {

    width:500px;
    margin:50px auto;
    background:white;
    padding:20px;
    border-radius:10px;
}


#messages {

    height:400px;
    overflow-y:auto;
    border:1px solid #ddd;
    padding:10px;

}


.user {

    color:blue;
    margin:10px;

}


.bot {

    color:green;
    margin:10px;

}


input {

    width:80%;
    padding:10px;

}


button {

    padding:10px;
    background:#007bff;
    color:white;
    border:none;

}


</style>


</head>


<body>


<div class="chat-container">


<h2>
AI Chatbot
</h2>


<div id="messages"></div>


<br>


<input 
id="message"
placeholder="Type your message..."
>


<button onclick="sendMessage()">
Send
</button>


</div>



<script>


async function sendMessage(){


    let input =
        document.getElementById("message");


    let message =
        input.value;


    if(message==="")
        return;



    addMessage(
        "You: " + message,
        "user"
    );


    input.value="";



    let response =
        await fetch(
            "/chat",
            {

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },


            body:JSON.stringify({

                message:message

            })

        });



    let data =
        await response.json();



    addMessage(
        "AI: " + data.reply,
        "bot"
    );


}



function addMessage(text,type){


    let div =
    document.createElement("div");


    div.className=type;


    div.innerHTML=text;


    document
    .getElementById("messages")
    .appendChild(div);



}


</script>


</body>

</html>
